name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
            archive: rev-windows-x86_64.zip
          - os: ubuntu-latest
            target: linux-x86_64
            archive: rev-linux-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --package rev-cli

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/rev-cli.exe dist/rev.exe
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/rev-cli dist/rev
          cp README.md LICENSE dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
